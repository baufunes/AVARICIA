<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador Mundial 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <h1>⚽ Simulador Mundial 2026</h1>
    <p id="subtitle" class="subtitle">Cargando predicciones...</p>
  </header>

  <main id="app">
    <!-- Todo el contenido de acá abajo lo genera script.js a partir de
         data/predictions.json. Si ves esto en el navegador, es que el
         JSON todavía no cargó (o falló). -->
    <p id="loading-message">Cargando datos del torneo...</p>
  </main>

  <footer class="site-footer">
    <p>Las predicciones se actualizan automáticamente varias veces al día.
       Última actualización: <span id="last-updated">-</span></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
