name: Deploy GitHub Pages

# Se dispara solo cada vez que cambia algo dentro de docs/ (por ejemplo,
# cuando update_predictions.yml sube un JSON nuevo), o manualmente.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita que se pisen dos despliegues corriendo al mismo tiempo
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Bajar el código del repo
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empaquetar la carpeta docs/
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
